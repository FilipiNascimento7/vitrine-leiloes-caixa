name: Atualizar vitrine de imóveis Caixa

# Coleta os imóveis da Caixa e comita a pasta docs/.
# A publicação é feita pelo Cloudflare Pages, que observa este repositório
# e publica sozinho a cada commit — não é preciso nenhum passo de deploy aqui.

on:
  schedule:
    # 10:00 UTC = 07:00 de Brasília, todos os dias
    - cron: "0 10 * * *"
  workflow_dispatch:        # permite rodar na mão pelo botão "Run workflow"
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: atualizar-vitrine
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Coletar imóveis da Caixa
        run: python build.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Atualiza vitrine — $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
